<!DOCTYPE html>
<html lang="en">
<head>

<title>Big Ears Now</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --text: #e0e0e0;
  --text-dim: #8899aa;
  --accent: #e94560;
  --t1: #f0a030;
  --t2: #4ea8de;
  --t3: #6bcb77;
  --t4: #888;
  --t0: #555;
  --card-bg: #1e2a4a;
  --card-border: #2a3a5a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 2rem;
}
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg2);
  border-bottom: 1px solid var(--card-border);
  padding: 0.6rem 1rem;
}
.header h1 {
  font-size: 1.1rem;
  color: var(--accent);
  margin-bottom: 0.3rem;
}
.time-display {
  font-size: 1.4rem;
  font-weight: bold;
  font-variant-numeric: tabular-nums;
}
.live-badge {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 0.65rem;
  font-weight: bold;
  padding: 0.1rem 0.4rem;
  border-radius: 3px;
  vertical-align: middle;
  margin-left: 0.4rem;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.controls {
  background: var(--bg2);
  padding: 0.5rem 1rem;
  border-bottom: 1px solid var(--card-border);
}
.control-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.4rem;
}
.control-row:last-child { margin-bottom: 0; }
.control-row label {
  font-size: 0.75rem;
  color: var(--text-dim);
  min-width: 5.5rem;
  flex-shrink: 0;
}
.control-row input[type="range"] {
  flex: 1;
  accent-color: var(--accent);
}
.control-row .value {
  font-size: 0.8rem;
  font-weight: bold;
  min-width: 3.5rem;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.search-bar {
  padding: 0.4rem 1rem;
  background: var(--bg2);
  border-bottom: 1px solid var(--card-border);
}
.search-bar input {
  width: 100%;
  padding: 0.4rem 0.6rem;
  border-radius: 6px;
  border: 1px solid var(--card-border);
  background: var(--bg);
  color: var(--text);
  font-size: 0.85rem;
  outline: none;
}
.search-bar input:focus {
  border-color: var(--accent);
}
.card .fav-star {
  position: absolute;
  top: 0.4rem;
  right: 0.4rem;
  font-size: 1.1rem;
  cursor: pointer;
  color: var(--card-border);
  z-index: 1;
  line-height: 1;
}
.card .fav-star.favorited {
  color: var(--t1);
}
.card.is-fav {
  background: #2a2a1a;
}
.filter-bar {
  display: flex;
  gap: 0.4rem;
  padding: 0.5rem 1rem;
  background: var(--bg2);
  border-bottom: 1px solid var(--card-border);
  flex-wrap: wrap;
  align-items: center;
}
.filter-btn {
  font-size: 0.7rem;
  padding: 0.25rem 0.6rem;
  border-radius: 12px;
  border: 1px solid var(--card-border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
}
.filter-btn.active {
  background: var(--bg3);
  color: var(--text);
  border-color: var(--accent);
}
.filter-btn:hover { border-color: var(--text-dim); }
.reset-btn {
  font-size: 0.7rem;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  margin-left: auto;
}
.reset-btn:hover { background: var(--accent); color: #fff; }
.venue-toggle {
  font-size: 0.7rem;
  color: var(--text-dim);
  cursor: pointer;
  padding: 0.25rem 0.6rem;
  border: 1px solid var(--card-border);
  border-radius: 12px;
  background: transparent;
}
.venue-toggle:hover { border-color: var(--text-dim); }
.venue-panel {
  display: none;
  background: var(--bg2);
  border-bottom: 1px solid var(--card-border);
  padding: 0.5rem 1rem;
  max-height: 40vh;
  overflow-y: auto;
}
.venue-panel.open { display: block; }
.venue-panel .venue-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 0.2rem 0.5rem;
}
.venue-panel label {
  font-size: 0.72rem;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 0.3rem;
  cursor: pointer;
}
.venue-panel label:has(input:checked) { color: var(--text); }
.venue-panel input[type="checkbox"] { accent-color: var(--accent); }
.venue-panel .venue-actions {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 0.4rem;
}
.venue-panel .venue-actions button {
  font-size: 0.68rem;
  padding: 0.15rem 0.5rem;
  border-radius: 3px;
  border: 1px solid var(--card-border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
}
.venue-panel .venue-actions button:hover {
  background: var(--bg3);
  color: var(--text);
}
.section {
  padding: 0.6rem 1rem 0.2rem;
}
.section h2 {
  font-size: 0.85rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.4rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.section h2 .count {
  font-size: 0.7rem;
  background: var(--bg3);
  padding: 0.1rem 0.4rem;
  border-radius: 8px;
}
.card {
  background: var(--card-bg);
  border-radius: 8px;
  padding: 0.6rem 0.7rem;
  margin-bottom: 0.4rem;
  border-left: 4px solid var(--t0);
  position: relative;
}
.card.tier-1 { border-left-color: var(--t1); }
.card.tier-2 { border-left-color: var(--t2); }
.card.tier-3 { border-left-color: var(--t3); }
.card.tier-4 { border-left-color: var(--t4); }
.card .card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 0.5rem;
}
.card .card-left { flex: 1; min-width: 0; }
.card .card-right {
  text-align: right;
  flex-shrink: 0;
}
.card .artist {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 0.1rem;
}
.card .venue-line {
  font-size: 0.75rem;
  color: var(--text-dim);
  display: flex;
  align-items: baseline;
  gap: 0;
}
.card .venue-line .venue-name { white-space: nowrap; }
.card .venue-line .dist-sep {
  margin: 0 0.3rem;
  color: var(--card-border);
}
.card .venue-line .dist-val { white-space: nowrap; }
.card .venue-line .genre-tag {
  font-size: 0.68rem;
  color: var(--t2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-left: auto;
  padding-left: 0.4rem;
}
.card .time-span {
  font-size: 0.75rem;
  color: var(--text-dim);
}
.card .remaining {
  font-weight: bold;
  font-size: 0.9rem;
}
.card .remaining.urgent { color: var(--accent); }
.card .remaining.ok { color: var(--t3); }
.card .starts-in {
  font-weight: bold;
  font-size: 0.9rem;
  color: var(--t2);
}
.card .desc-line {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-top: 0.25rem;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card.expanded .desc-line {
  display: none;
}
.card .categories {
  display: flex;
  gap: 0.25rem;
  margin-top: 0.25rem;
  flex-wrap: wrap;
}
.card .cat-badge {
  font-size: 0.6rem;
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  background: var(--bg3);
  color: var(--text-dim);
}
.card .cat-badge.free { background: #1a4a2a; color: #6bcb77; }
.card .cat-badge.film { background: #4a2a1a; color: #e0a060; }
.card .cat-badge.whatfor { background: #4a1a4a; color: #d070d0; }
.card .expand-arrow {
  font-size: 0.6rem;
  color: var(--text-dim);
  transition: transform 0.2s;
  margin-left: 0.3rem;
}
.card.expanded .expand-arrow { transform: rotate(180deg); }
.card .detail {
  display: none;
  margin-top: 0.4rem;
  padding-top: 0.4rem;
  border-top: 1px solid var(--card-border);
}
.card.expanded .detail { display: block; }
.card .detail .full-desc {
  font-size: 0.72rem;
  color: var(--text-dim);
  line-height: 1.35;
  margin-bottom: 0.3rem;
}
.card .detail .artist-link {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: bold;
  margin-bottom: 0.3rem;
}
.card .detail .match-reason {
  font-size: 0.72rem;
  color: var(--text-dim);
  font-style: italic;
  margin-bottom: 0.3rem;
}
.card .detail .tidal-links {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}
.card .detail .tidal-link {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.75rem;
  color: var(--text);
  background: var(--bg3);
  padding: 0.3rem 0.6rem;
  border-radius: 6px;
  text-decoration: none;
  border: 1px solid var(--card-border);
}
.card .detail .tidal-link:active {
  background: var(--accent);
}
.card .detail .tidal-link .note-icon {
  font-size: 0.85rem;
}
  font-weight: bold;
  font-size: 0.8rem;
  color: var(--t2);
}
.empty-msg {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.85rem;
  padding: 1.5rem 1rem;
}
.tier-legend {
  display: flex;
  gap: 0.6rem;
  padding: 0.3rem 1rem;
  font-size: 0.65rem;
  color: var(--text-dim);
}
.tier-legend span {
  display: flex;
  align-items: center;
  gap: 0.2rem;
}
.tier-legend .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.dot-1 { background: var(--t1); }
.dot-2 { background: var(--t2); }
.dot-3 { background: var(--t3); }
.dot-0 { background: var(--t0); }
.geo-status {
  font-size: 0.65rem;
  color: var(--text-dim);
  padding: 0 1rem 0.3rem;
}
</style>
</head>

<div class="header">

  </div>
</div>

<div class="controls">

    <label>Reference</label>

</div>

<div class="venue-panel" id="venuePanel">

  <span><span class="dot dot-0"></span> Unranked</span>
</div>

<div class="geo-status" id="geoStatus"></div>

</div>

<div class="section" id="upSection">

</div>

rking. Smith wrote each piece on Clone Row’s...", "artistId": "", "tracks": []}, {"id": "33529", "title": "Chicago Underground Duo", "venue": "Standard", "area": "Central", "lat": 35.967709, "lng": -83.921944, "start": "2026-03-29 1:00 pm", "end": "2026-03-29 2:15 pm", "tier": 0, "genre": "Avant jazz / electronic", "matchReason": "", "notes": "", "categories": ["Curated by Josh Johnson", "Festival Performance"], "summary": "Rob Mazurek and Chad Taylor Chicago Underground Duo—that is, multi-instrumentalists Rob Mazurek and Chad Taylor—are a testament to long and boundless friendships, to a...", "fullDesc": "Rob Mazurek and Chad Taylor Chicago Underground Duo—that is, multi-instrumentalists Rob Mazurek and Chad Taylor—are a testament to long and boundless friendships, to a relationship that allows you to pursue any new frontier. Taylor and Mazurek first played together as teenagers in the late ‘80s in Chicago; through the next decade, they bounded inside of that city’s fertile scene, where underground rock, jazz, and experimental composition constantly commingled in acts like Tortoise and Gastr del Sol. When they finally released their debut together in 1998, they called it 12º of Freedom , an...", "artistId": "4362417", "tracks": [{"title": "Hyperglyph", "tidalId": "440605773"}, {"title": "Click Song", "tidalId": "440605772"}, {"title": "Rhythm Cloth", "tidalId": "440605774"}]}, {"id": "34461", "title": "Chris Thile", "venue": "Knoxville Civic Auditorium", "area": "", "lat": 35.96569062, "lng": -83.91192136, "start": "2026-03-29 3:00 pm", "end": "2026-03-29 4:15 pm", "tier": 0, "genre": "Bluegrass / mandolin", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "No mandolin player below the age of 50 has done more to stretch the boundaries of that instrument than Chris Thile. Now in his mid-40s, Thile began playing 40 years ago,...", "fullDesc": "No mandolin player below the age of 50 has done more to stretch the boundaries of that instrument than Chris Thile. Now in his mid-40s, Thile began playing 40 years ago, forming his first band—the eventual progressive pop bluegrass standouts Nickel Creek­—long before he was 10. When that band began to achieve crossover status at the start of the new millennium, though, Thile was not content to ride its wave of popularity. He began churning out exploratory solo albums with contributions from esteemed elders like Béla Fleck and Jerry Douglas and then considering how his mandolin might fit in...", "artistId": "4194", "tracks": [{"title": "Heart In A Cage", "tidalId": "3409766"}, {"title": "Wachet auf, ruft uns die Stimme, BWV 645 (Arr. for Mandolin, Cello, and Double Bass)", "tidalId": "71989689"}, {"title": "Trio Sonata No. 6 in G Major, BWV 530: II. Lento (Arr. for Mandolin, Cello, and Double Bass)", "tidalId": "71989686"}]}, {"id": "33532", "title": "Chuck Johnson", "venue": "St. John's", "area": "South", "lat": 35.96199314679845, "lng": -83.91856766363762, "start": "2026-03-26 10:45 pm", "end": "2026-03-27 12:00 am", "tier": 0, "genre": "Pedal steel / ambient", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "Chuck Johnson is not a fan of the terms Ambient Americana or Cosmic Americana, either for the ways they reduce sound to word clouds or their old genre associations; still, his...", "fullDesc": "Chuck Johnson is not a fan of the terms Ambient Americana or Cosmic Americana, either for the ways they reduce sound to word clouds or their old genre associations; still, his magisterial and imaginative records helped create the path for those recombinant notions to exist at all. His 2017 album, Balsams , represented not only the fourth or fifth act of a career that stretched back a quarter-century—it also opened avenues for the pedal steel guitar, who can make meditative music, and how they can do it. “Riga Black” glowed like a sun reaching the horizon and settling there, refusing to set...", "artistId": "3932052", "tracks": [{"title": "Calamus", "tidalId": "412889041"}, {"title": "Eye on the Sparrow", "tidalId": "412889044"}, {"title": "Labradorite Eye", "tidalId": "412889045"}]}, {"id": "33533", "title": "Cleo Reed", "venue": "Standard", "area": "Central", "lat": 35.967709, "lng": -83.921944, "start": "2026-03-27 12:00 pm", "end": "2026-03-27 1:15 pm", "tier": 0, "genre": "Black folk / blues / country", "matchReason": "", "notes": "", "categories": ["Curated by Josh Johnson", "Festival Performance"], "summary": "Cleo Reed is here to reshape your understanding of American folk music—or of the breadth and depth that’s possible when you render it as Americana.", "fullDesc": "Cleo Reed is here to reshape your understanding of American folk music—or of the breadth and depth that’s possible when you render it as Americana. The child of parents who met in the South and then headed for New York City, Reed’s vision of what constitutes folk reflects ideas of the country not only as a melting pot but also where change is lifeblood, where progress is the force that sustains it. “Folkloric because it is tethered to a location, because it is tethered to a demographic of people,” Reed said, describing the abiding ethic of their astounding 2025 breakout, Cuntry , to...", "artistId": "10207942", "tracks": [{"title": "Women At War", "tidalId": "446767928"}, {"title": "Strike!", "tidalId": "446767937"}, {"title": "Sleep Song", "tidalId": "446767931"}]}, {"id": "33661", "title": "Cobra", "venue": "Bijou Theatre", "area": "South", "lat": 35.96243681, "lng": -83.91678796, "start": "2026-03-28 12:00 pm", "end": "2026-03-28 1:00 pm", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Festival Performance", "John Zorn"], "summary": "After first emerging in the experimental Wild West of New York’s downtown scene in the ’70s, the span and scale of Zorn’s work have only seemed to increase over the intervening...", "fullDesc": "After first emerging in the experimental Wild West of New York’s downtown scene in the ’70s, the span and scale of Zorn’s work have only seemed to increase over the intervening decades. From his breakthrough reinterpretations of Ennio Morricone and ground-breaking musical “games” like Cobra to his splenetic art-grindcore with Naked City, from his jazz-reorienting in Masada to his compositional gauntlets like Moonchild and Incerto, Zorn has packed several lifetimes of music-making into 72 years. He seems to have only grown more active and tireless of late. Zorn has also been a crucial...", "artistId": "", "tracks": []}, {"id": "35105", "title": "Colle", "venue": "PostModern Sound", "area": "", "lat": 35.96856, "lng": -83.92069, "start": "2026-03-28 3:00 pm", "end": "2026-03-28 3:45 pm", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "Colle is a fascinating piece in an emerging and amorphous puzzle of international sound, where the anxiety of modern existence is blanketed by nostalgic echoes of the past.", "fullDesc": "Colle is a fascinating piece in an emerging and amorphous puzzle of international sound, where the anxiety of modern existence is blanketed by nostalgic echoes of the past. The project of Chanel Beads member Maya McGrory, Colle emerged in the summer of 2024 with a string of beguiling singles on the London imprint urtruimage. Those songs—“Silent But For Joy” and “Green Edge”—surrounded Colle’s ethereal and broad voice with the trappings of early 4AD and trip-hop masterpieces, disjointed drums bobbing in seas of synths and vaporized guitars. Released late in 2024 to critical acclaim, her...", "artistId": "14281", "tracks": [{"title": "December", "tidalId": "192089036"}, {"title": "The World I Know (LP Version)", "tidalId": "192089034"}, {"title": "Where The River Flows", "tidalId": "192089037"}]}, {"id": "35717", "title": "Critics Picks: Navigating Big Ears 2026", "venue": "Blue Note Lounge", "area": "", "lat": 35.96939532, "lng": -83.92027319, "start": "2026-03-26 4:30 pm", "end": "2026-03-26 5:30 pm", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Conversations", "Free", "Free Programming"], "summary": "’re still plotting your path through Big Ears 2026 on opening day, Thursday, March 26, you may want to sit to hear what our esteemed panel of writers and cultural commentators...", "fullDesc": "’re still plotting your path through Big Ears 2026 on opening day, Thursday, March 26, you may want to sit to hear what our esteemed panel of writers and cultural commentators have in mind. At 4:30pm that day, just before the first shows, NPR’s Ann Powers, WRTI’s Nate Chinen, Grammy-Award winning writer Ashley Kahn, Pitchfork’s Jeremy Larson, WNYC’s New Sounds’ host John Schaefer will share some ideas. They’ll be at the Blue Note Lounge.", "artistId": "", "tracks": []}, {"id": "35917", "title": "Curious Listening in the Streaming Era", "venue": "PostModern Sound", "area": "", "lat": 35.96856, "lng": -83.92069, "start": "2026-03-28 12:30 pm", "end": "2026-03-28 1:30 pm", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Conversations", "Free", "Free Programming"], "summary": "W/ Liz Pelly, John Schafer (moderators), Patrick Shiroishi, Bob Holmes, + Yasmin Williams Contemporary digital listening platforms have been criticized for encouraging...", "fullDesc": "w/ Liz Pelly, John Schafer (moderators), Patrick Shiroishi, Bob Holmes, + Yasmin Williams Contemporary digital listening platforms have been criticized for encouraging homogenous listening and incentivizing one-note background-friendly sounds. How, then, are independent and grassroots music communities preserving a spirit of active, engaged listening against the logics of these paradigms? This conversation explores how artists, organizers and programmers are cultivating curious listening in the streaming era. We’ll establish some of the problems presented by today’s streaming status quo,...", "artistId": "", "tracks": []}, {"id": "33534", "title": "Cymande", "venue": "Mill & Mine", "area": "West", "lat": 35.971106, "lng": -83.92042481, "start": "2026-03-28 6:00 pm", "end": "2026-03-28 7:15 pm", "tier": 0, "genre": "UK funk / Afrobeat / soul", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "If, at any point, you have listened to what is now accepted as classic hip-hop, from the fledgling breakbeats of the late ’70s to The Score by the Fugees or “Change in Speak”...", "fullDesc": "If, at any point, you have listened to what is now accepted as classic hip-hop, from the fledgling breakbeats of the late ’70s to The Score by the Fugees or “Change in Speak” by De La Soul, you have already enjoyed the wonders of Cymande. A short-lived group of African and Caribbean immigrants living in London in the early ’70s, Cymande made three astounding records in as many years. They had a hit in the States, shared stages with Al Green, and disbanded soon after, when they encountered the glass ceiling of British pop racism. But their records were perfectly crafted sets of politically...", "artistId": "3607354", "tracks": [{"title": "Brothers On The Slide", "tidalId": "403450183"}, {"title": "Bra", "tidalId": "403424234"}, {"title": "The Message", "tidalId": "403424235"}]}, {"id": "34106", "title": "Darius Jones Trio", "venue": "Blackbox", "area": "", "lat": 35.96901381, "lng": -83.91906921, "start": "2026-03-28 10:15 pm", "end": "2026-03-28 11:30 pm", "tier": 0, "genre": "Avant-jazz saxophone", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "Legend of e'Boi (The Hypervigilant Eye) Darius Jones is an alto saxophonist as ferocious as he is tender, as prone to wailing rampages of sound as he is to delicate laments.", "fullDesc": "Legend of e'Boi (The Hypervigilant Eye) Darius Jones is an alto saxophonist as ferocious as he is tender, as prone to wailing rampages of sound as he is to delicate laments. “For a long time, I looked at my saxophone as a weapon like a Samurai and his sword,” he once told Fifteen Questions . “Lately the relationship has evolved into an animal and its human companion.” His playing holds space for both of those roles, especially on his revealing planned nine-album series, Man’ish Boy , his years-long contemplation of mental health struggles in Black men and the work it takes to overcome...", "artistId": "", "tracks": []}, {"id": "34656", "title": "Darrell Scott’s Electrifying Trio", "venue": "Jackson Terminal", "area": "Central", "lat": 35.96906899, "lng": -83.92066215, "start": "2026-03-27 12:30 pm", "end": "2026-03-27 1:45 pm", "tier": 0, "genre": "Americana / roots songwriter", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "For the last quarter-century, Darrell Scott has been a country music hit machine, responsible for Travis Tritt’s anthemic “It’s a Great Day to Be Alive,” Brad Paisley’s “You’ll...", "fullDesc": "For the last quarter-century, Darrell Scott has been a country music hit machine, responsible for Travis Tritt’s anthemic “It’s a Great Day to Be Alive,” Brad Paisley’s “You’ll Never Leave Harlan Alive,” and the Chicks’ “Long Time Gone.” As a writer, Scott combines gentleness and candor, his empathy for the straits of his subjects linked with an honesty about what it means to wake up and face the world each morning. Scott’s own dozen-plus albums carry the same sort of heart but emphasize both his literary sensibility and his sophisticated guitar playing. He was part of Steve Earle’s...", "artistId": "3549709", "tracks": [{"title": "You'll Never Leave Harlan Alive", "tidalId": "35223500"}, {"title": "You'll Never Leave Harlan Alive", "tidalId": "37333742"}, {"title": "It's A Great Day To Be Alive", "tidalId": "35223502"}]}, {"id": "33535", "title": "Dave Douglas GIFTS Quintet", "venue": "Bijou Theatre", "area": "South", "lat": 35.96243681, "lng": -83.91678796, "start": "2026-03-29 7:15 pm", "end": "2026-03-29 8:30 pm", "tier": 0, "genre": "Contemporary jazz", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "A longtime bandleader with an insatiable sense for enlisting new partners, from Bill Laswell and Yuka Honda to Chris Potter and Mary Halvorson, Douglas was John Zorn’s longtime...", "fullDesc": "A longtime bandleader with an insatiable sense for enlisting new partners, from Bill Laswell and Yuka Honda to Chris Potter and Mary Halvorson, Douglas was John Zorn’s longtime counterpart in the ground-breaking Masada. Aside from his playing, which can shuttle quickly between the seamless and the warped, Douglas’ true power may be his ability to spy fresh talent and fold it into his own ideas, or let that talent inform those ideas. Jeff Parker, Shigeto, Aoife O’Donovan: They have all figured prominently if unexpectedly into Douglas’ most recent decade. The new Gifts Quintet is a testament...", "artistId": "", "tracks": []}, {"id": "33537", "title": "Dave Harrington & Mary Lattimore", "venue": "Greyhound", "area": "", "lat": 35.972464065046495, "lng": -83.9195437861108, "start": "2026-03-27 2:30 pm", "end": "2026-03-27 3:45 pm", "tier": 0, "genre": "Harp / ambient", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "Mary Lattimore and Dave Harrington are tireless collaborators. Consider their résumés: After landing in Philadelphia more than a dozen years ago, Lattimore—a harpist whose...", "fullDesc": "Mary Lattimore and Dave Harrington are tireless collaborators. Consider their résumés: After landing in Philadelphia more than a dozen years ago, Lattimore—a harpist whose music seems to outline the shapes, colors, and patterns of crystals—began working with Thurston Moore and Kurt Vile, Jarvis Cocker and Steve Gunn. Since landing in Los Angeles, she has made duets with Superchunk’s Mac McCaughan and the great Growing, the singular singer Julianna Barwick and the accordion whiz Walt McClements. Harrington—a guitarist with equal int  pm", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Film"], "summary": "Directed by Maciek Bochniak Ethiopiques is the history of Ethiopian music told from the perspective of Francis Falceto and Ethiopian musicians.", "fullDesc": "Directed by Maciek Bochniak Ethiopiques is the history of Ethiopian music told from the perspective of Francis Falceto and Ethiopian musicians. An avid follower of world music, Falceto was given a copy at a party in his hometown of Poitiers. The resultant excitement amongst listeners and journalists who had never heard of it before is the beginning of a long journey that is a landmark in the history of world music. It is also the story of the phenomenon of this unique music style which had a considerable influence on late 20th Century free jazz and pop music. This lost generation of...", "artistId": "", "tracks": []}, {"id": "35727", "title": "Éthiopiques: The Story of the Golden Age", "venue": "Blackbox", "area": "", "lat": 35.96901381, "lng": -83.91906921, "start": "2026-03-29 11:00 am", "end": "2026-03-29 12:00 pm", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Conversations"], "summary": "Big Ears 2026 is celebrating the richness of Ethiopian music with two films, a special concert by the Either/Orchestra and this conversation, led by author/producer Joe Boyd.", "fullDesc": "Big Ears 2026 is celebrating the richness of Ethiopian music with two films, a special concert by the Either/Orchestra and this conversation, led by author/producer Joe Boyd. Francis Falceto, creator of the extraordinary 32-volume Ethiopiques collection – has been invited to Knoxville to tell the fascinating story of how the Golden Era of Ethiopian jazz came to be, how he discovered it, and, over the past 30 years, has ensured that Ethiopian music was heard around the world. Francis will be joined in this discussion by Russ Gershon, leader of the Either/Orchestra, who will perform music...", "artistId": "", "tracks": []}, {"id": "35726", "title": "Festival Culture: Music in America Post-1965", "venue": "PostModern Sound", "area": "", "lat": 35.96856, "lng": -83.92069, "start": "2026-03-26 2:30 pm", "end": "2026-03-26 3:30 pm", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Conversations", "Free", "Free Programming"], "summary": "(co-director of Newport and the Great Folk Dream), author and producer Joe Boyd (who was production manager at the 1965 Newport Folk Festival), and Ashley Capps, (founder of...", "fullDesc": "(co-director of Newport and the Great Folk Dream), author and producer Joe Boyd (who was production manager at the 1965 Newport Folk Festival), and Ashley Capps, (founder of the Big Ears and Bonnaroo Festivals) discuss the legacy of Newport ’65 and the impact of festivals on American culture and music. From the charged atmosphere of the 1960s to the fractured and fertile present, the conversation ranges across history, memory, and what it means to keep adventurous music alive.", "artistId": "", "tracks": []}, {"id": "35909", "title": "Fight With Music: A Conversation with Marc Ribot & Grayson Haver Currin", "venue": "PostModern Sound", "area": "", "lat": 35.96856, "lng": -83.92069, "start": "2026-03-28 11:00 am", "end": "2026-03-28 12:00 pm", "tier": 0, "genre": "Avant-rock guitar / jazz", "matchReason": "", "notes": "", "categories": ["Conversations", "Free", "Free Programming"], "summary": "From his reams of radical bands like Ceramic Dog, Shrek, and Los Cubanos Postizos to his long-running collaborations with Tom Waits, John Zorn, and so many others, Marc Ribot...", "fullDesc": "From his reams of radical bands like Ceramic Dog, Shrek, and Los Cubanos Postizos to his long-running collaborations with Tom Waits, John Zorn, and so many others, Marc Ribot has always brought a radical edge to his guitar playing. He is now a tireless activist, too, organizing on behalf of indie musicians seeking fair payments and representation in the digita xperiences and opinions about them, rendered with a wry wit and emotional sincerity and (inspired by Daniel Johnston) delivered with an unfussy, straight-to-tape...", "artistId": "", "tracks": [{"title": "Seattle", "tidalId": "423263308"}]}, {"id": "34460", "title": "Jesse Harris Cosmo", "venue": "Barley's", "area": "", "lat": 35.97101682269029, "lng": -83.91751098882378, "start": "2026-03-26 11:30 pm", "end": "2026-03-27 12:45 am", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "As it has for so many musicians, an invitation from John Zorn altered the trajectory and possibility of Jesse Harris’s music.", "fullDesc": "As it has for so many musicians, an invitation from John Zorn altered the trajectory and possibility of Jesse Harris’s music. By 2010, Harris had already made a handful of sophisticated pop albums, applying the same smarts he delivered in songs he had penned for the likes of Norah Jones, Solomon Burke, and Lizz Wright to his own generous sound. But Zorn asked if he might make an all-instrumental affair for Tzadik’s Key Series, patching together a few new songs with wordless re-imaginings of cuts from his own catalogue. The result, Cosmo , was a beautiful blend of Brill Building flair and...", "artistId": "", "tracks": []}, {"id": "33565", "title": "Jimmie Dale Gilmore & Butch Hancock", "venue": "Point", "area": "West", "lat": 35.97291320447279, "lng": -83.92269574982265, "start": "2026-03-27 1:15 pm", "end": "2026-03-27 2:30 pm", "tier": 0, "genre": "Texas Americana / Flatlanders", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "The Flatlanders were so ahead of their time that the trio—songwriters Jimmie Dale Gilmore, Joe Ely, and Butch Hancock—waited 30 years before making a follow-up.", "fullDesc": "The Flatlanders were so ahead of their time that the trio—songwriters Jimmie Dale Gilmore, Joe Ely, and Butch Hancock—waited 30 years before making a follow-up ought a second feast of clips, stories, sights and sounds covering ground not included in...", "fullDesc": "Following the success of their audio-visual event at Big Ears 2025, Joe Boyd has brought a second feast of clips, stories, sights and sounds covering ground not included in their first (Friday at 10am): Caetano Veloso, Toots and the Maytals, Fela Kuti, Bob Marley and many more star in the second chapter of this unique event. Created by Andrea Goertler and Joe Boyd and assembled by Timothy Watson.", "artistId": "", "tracks": []}, {"id": "34109", "title": "Joe Westerlund", "venue": "Boyd's Jig and Reel", "area": "", "lat": 35.97031544, "lng": -83.91852457, "start": "2026-03-27 3:15 pm", "end": "2026-03-27 4:30 pm", "tier": 0, "genre": "Solo percussion", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "For the last five years, Joe Westerlund’s music has explored and documented his personal unknowns. Before the 2020 release of his solo debut, Reveries in the Rift , Westerlund...", "fullDesc": "For the last five years, Joe Westerlund’s music has explored and documented his personal unknowns. Before the 2020 release of his solo debut, Reveries in the Rift , Westerlund was largely a band guy, whether that meant charting the edges of folk-rock with his childhood friends in DeYarmond Edison and, later, Megafaun, or offering the anchor to acts like Watchhouse and The Dead Tongues. But on Reveries , he wondered what it would be like to make meditative percussive music, to wander into the middle distance of his own introspection with his drum kit. Some of those findings reappeared on...", "artistId": "8130882", "tracks": [{"title": "Nu Male Uno", "tidalId": "443889416"}, {"title": "Persurverance", "tidalId": "443889421"}, {"title": "Peebles ’n’ Stones", "tidalId": "443889417"}]}, {"id": "34142", "title": "John Mailander’s Forecast", "venue": "Barley's", "area": "", "lat": 35.97101682269029, "lng": -83.91751098882378, "start": "2026-03-28 ast track to jazz stardom down which Scofield sprinted. Alongside strings of formidable records for the likes of Blue Note, Verve, Impulse!, and ECM with bands that have ranged from Jack DeJohnette and Steve Swallow...", "artistId": "", "tracks": [{"title": "Just Don't Want To Be Lonely", "tidalId": "20023969"}, {"title": "Hudson", "tidalId": "72848058"}]}, {"id": "35765", "title": "Joyful Noise Presents: Molten Soundscapes", "venue": "Pretentious Beer", "area": "", "lat": 35.97058, "lng": -83.91791, "start": "2026-03-28 6:00 pm", "end": "2026-03-28 8:00 pm", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Festival Performance", "Free Programming"], "summary": "Patrick Shirioishi, Dave Harrington, Max Jaffe and Shahzad Ismaily Molten glass, at its core, is memory made physical — every movement at the bench, every vibration in the...", "fullDesc": "ft. Patrick Shirioishi, Dave Harrington, Max Jaffe and Shahzad Ismaily Molten glass, at its core, is memory made physical — every movement at the bench, every vibration in the room, every shift in mood absorbed and held in the hardening material. That philosophy, developed by glassblower and conceptual artist Mark Mitsuda, holds that you cannot make a beautiful object without moving beautifully at every step in between. Presented by Joyful Noise, Molten Soundscapes takes that idea as its premise: a live improvisation by Patrick Shiroishi, Dave Harrington, Max Jaffe, and Shahzad Ismaily...", "artistId": "", "tracks": []}, {"id": "35769", "title": "Joyful Noise Presents: The Joyful Noise Players", "venue": "Pretentious Beer", "area": "", "lat": 35.97058, "lng": -83.91791, "start": "2026-03-28 3:00 pm", "end": "2026-03-28 5:00 pm", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Festival Performance", "Free", "Free Programming"], "summary": "Wendy Eisenberg, Shahzad Ismaely, Greg Saunier, Booker Stardrum, Patrick Shirioishi, Kishi Bashi, Tall Tall Trees & More!", "fullDesc": "Feat. Wendy Eisenberg, Shahzad Ismaely, Greg Saunier, Booker Stardrum, Patrick Shirioishi, Kishi Bashi, Tall Tall Trees & More! No artist statement, no rehearsal, no designated seating — just musicians, a patio, and whatever happens next. Featuring Wendy Eisenberg, Shahzad Ismaily, Greg Saunier, Booker Stardrum, Patrick Shiroishi, Kishi Bashi, Tall Tall Trees, and more, this is a practice in spontaneity, an invitation to accept the unexpected with wide open eyes. Presented at Pretentious Brewing, where the adjacent glass-blowing studio keeps its own unpredictable fire burning.", "artistId": "", "tracks": []}, {"id": "33569", "title": "Julia Úlehla & Dálava", "venue": "1st Pres Sanctuary", "area": "", "lat": 35.96421251451967, "lng": -83.91625117711148, "start": "2026-03-28 8:15 pm", "end": "2026-03-28 9:30 pm", "tier": 0, "genre": "Czech folk / post-rock", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "Though Julia Úlehla was born in the United States and is now based in British Columbia, she inherited a wealth of Czech music.", "fullDesc": "Though Julia Úlehla was born in the United States and is now based in British Columbia, she inherited a wealth of Czech music. More than a century ago, her great grandfather, Vladimír Úlehla, collected hundreds of folk tunes from Strážnice, a village of a few thousand in the South Moravian Region. Those transcriptions were long censored, but Úlehla—a classically trained singer, actress, and teacher—has revived them in entirely unexpected ways through Dálava, her amorphous ensemble with husband and guitarist Aram Bajakian. On Understories , one of 2025’s most intriguing records, Bajakian...", "artistId": "", "tracks": [{"title": "the way down", "tidalId": "428084806"}]}, {"id": "33567", "title": "Julian Lage Quartet", "venue": "Tennessee Theatre", "area": "South", "lat": 35.96416281, "lng": -83.91753166, "start": "2026-03-29 1:00 pm", "end": "2026-03-29 2:15 pm", "tier": 0, "genre": "Jazz guitar lead a gnawa band there. By day, he held odd jobs while, at night, he played anywhere that would have...", "artistId": "57746522", "tracks": [{"title": "Aicha", "tidalId": "460969602"}, {"title": "Negshah", "tidalId": "460969606"}, {"title": "Baba Mimoun", "tidalId": "460969600"}]}, {"id": "35102", "title": "Sam Amidon", "venue": "Jackson Terminal", "area": "Central", "lat": 35.96906899, "lng": -83.92066215, "start": "2026-03-26 8:15 pm", "end": "2026-03-26 9:30 pm", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "Sam Amidon was born so deep into the world of American folk music and art that, by the time he was a teenager, he was a member of his own contradance band.", "fullDesc": "Sam Amidon was born so deep into the world of American folk music and art that, by the time he was a teenager, he was a member of his own contradance band. Based in Vermont, Amidon’s parents were invested in shape-note singing communities and the influential Bread & Puppet theater company, and he began playing at an age when most kids don’t yet know how to read. But rather quickly, Amidon’s interests began to stretch beyond traditional folk, even as he became an accomplished fiddler and then banjo player. “When I heard it,” he once told The Creative Independent about listening to a free...", "artistId": "3756244", "tracks": [{"title": "Sundown (feat. Beth Orton)", "tidalId": "152431580"}, {"title": "I Wish I Wish", "tidalId": "20020349"}, {"title": "Maggie", "tidalId": "152431572"}]}, {"id": "35546", "title": "Sam Gendel", "venue": "Knox Museum of Art", "area": "", "lat": 35.96238976, "lng": -83.92533395, "start": "2026-03-29 3:15 pm", "end": "2026-03-29 4:30 pm", "tier": 0, "genre": "Ambient jazz", "matchReason": "", "notes": "", "categories": ["Festival Performance", "Free"], "summary": "Sam Gendel is known for his work with saxophones and wind controllers, as well as his original music and significant collaborations with artis rious styles of traditional music, including old-time fiddling, gospel singing, and traditional bluegrass.", "fullDesc": "The Gladson family resides in Hancock County Tennessee and plays various styles of traditional music, including old-time fiddling, gospel singing, and traditional bluegrass. The family keeps the authentic spirit of the music alive by performing regularly at heritage events, festivals, revivals and funerals. They also help carry on the tradition by teaching traditional music through the Hancock JAM (Junior Appalachian Musicians ) program.", "artistId": "", "tracks": []}, {"id": "35268", "title": "The Last Critic (2026)", "venue": "Riviera Cinema 2", "area": "", "lat": 35.96503, "lng": -83.91743, "start": "2026-03-26 1:00 pm", "end": "2026-03-26 3:00 pm", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Film"], "summary": "Tennessee Premiere, Directed by Matty Wishnow Robert Christgau, The Dean of American Rock Critics, whose work has inspired and infuriated readers for sixty years—is still at it...", "fullDesc": "Tennessee Premiere, Directed by Matty Wishnow Robert Christgau, The Dean of American Rock Critics, whose work has inspired and infuriated readers for sixty years—is still at it in his eighties, grading records, interrogating commas and listening to absolutely everything (except metal and prog). The Last Critic is the first documentary feature about Robert Christgau, a pioneer of music criticism. The self-proclaimed Dean of American Rock Critics, Christgau helped invent the form in 1967 while covering the Monterey Pop Festival for Esquire, then redefined the form in 1969 with his Consumer...", "artistId": "", "tracks": []}, {"id": "35434", "title": "The Living Earth Show: Trust Me", "venue": "Blackbox", "area": "", "lat": 35.96901381, "lng": -83.91906921, "start": "2026-03-28 2:45 pm", "end": "2026-03-28 4:00 pm", "tier": 0, "genre": "", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary  "140517212"}, {"title": "Colorwheel", "tidalId": "78865362"}]}, {"id": "33645", "title": "Uhlmann Johnson Wilkes", "venue": "1st Pres Sanctuary", "area": "", "lat": 35.96421251451967, "lng": -83.91625117711148, "start": "2026-03-27 1:15 pm", "end": "2026-03-27 2:30 pm", "tier": 0, "genre": "Electro-acoustic chamber", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "It seemed a fine bit of predestination that guitarist Gregory Uhlmann, saxophonist Josh Johnson, and bassist Sam Wilkes would become a trio.", "fullDesc": "It seemed a fine bit of predestination that guitarist Gregory Uhlmann, saxophonist Josh Johnson, and bassist Sam Wilkes would become a trio. Uhlmann and Johnson knew one another as actual adolescents in Chicago’s fertile jazz scene, even studying there under Tortoise great Jeff Parker before he split for Los Angeles. Wilkes, meanwhile, was an East Coast kid who headed west to study music in L.A., rapidly dropping into a scene at the experimental edges of indie rock. After they, too, arrived in California, Johnson and Uhlmann stumbled into a supergroup, SML; when Wilkes and Uhlmann began...", "artistId": "", "tracks": []}, {"id": "33646", "title": "Walt McClements", "venue": "Knox Museum of Art", "area": "", "lat": 35.96238976, "lng": -83.92533395, "start": "2026-03-29 1:00 pm", "end": "2026-03-29 2:15 pm", "tier": 0, "genre": "Accordion drone / ambient", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "", "fullDesc": "", "artistId": "18145375", "tracks": [{"title": "Nest of Earrings", "tidalId": "350820930"}, {"title": "The Poppies, the Wild Mustard, the Blue-Eyed Grass", "tidalId": "333369119"}, {"title": "A Painted Ship", "tidalId": "410092812"}]}, {"id": "35902", "title": "WDVX Big Plate Special", "venue": "Barley's", "area": "", "lat": 35.97101682269029, "lng": -83.91751098882378, "start": "2026-03-27 12:00 pm", "end": "2026-03-27 1:00 pm", "tier": 0, "genre": "", "matchReason": r from him, he is not a multi-instrumentalist. As the name of the astounding two-volume set he released in early 2025, Compositions for Guitar , makes clear, Graefe is a guitarist. The mistake is easy to make. Though he dances and tangles with steel strings like Fahey on “Shadow Country” and applies a feather light touch to “Tend Your Garden,” both from Vol. 2 , he processes his sounds with majesty and imagination on Vol. 1 . Where “Heartbreaks” sometimes sounds like a harp...", "artistId": "8907778", "tracks": [{"title": "I Said Yes", "tidalId": "458076907"}, {"title": "Femme Fatale", "tidalId": "458255324"}, {"title": "Return Home", "tidalId": "458255319"}]}, {"id": "33651", "title": "William Hooker Quartet", "venue": "Regas Square", "area": "North", "lat": 35.97012132, "lng": -83.92182399, "start": "2026-03-26 8:30 pm", "end": "2026-03-26 9:45 pm", "tier": 0, "genre": "Free jazz percussion", "matchReason": "", "notes": "", "categories": ["Festival Performance"], "summary": "Half a century ago, free jazz liberated William Hooker; he has never gone back, only forward into wide-open improvisation, into music that feels every time like a new explosion...", "fullDesc": "Half a century ago, free jazz liberated William Hooker; he has never gone back, only forward into wide-open improvisation, into music that feels every time like a new explosion of the spirit. Hooker was raised in Connecticut, his father a preacher in Beulah AME Zion Church. But when Hooker took to the drums at age 7, his parents didn’t circumscribe him to gospel music; he gigged constantly, whether backing Dionne Warwick or playing weddings. But during a stint in psychedelic California, he began to understand how personally emancipatory music could be, and he never played anyone else’s...", "artistId": "7134339", "tracks": [{"title": "Miracle of Tansen", "tidalId": "49806605"}, {"title": "Higher Triad", "tidalId": "85320414"}, {"title": "Instinst and Intellect", "tidalId": "49806608"}]}, {"id": "34440" // ---------------------------------------------------------------------------
// Parse event times into Date objects
// ---------------------------------------------------------------------------
function parseTime(s) {
  // Format: "2026-03-28 9:30 am"
  const m = s.match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{1,2}):(\d{2})\s*(am|pm)/i);
  if (!m) return null;
  let [, yr, mo, dy, hr, mn, ap] = m;
  hr = parseInt(hr);
  mn = parseInt(mn);
  if (ap.toLowerCase() === "pm" && hr !== 12) hr += 12;
  if (ap.toLowerCase() === "am" && hr === 12) hr = 0;
  return new Date(parseInt(yr), parseInt(mo) - 1, parseInt(dy), hr, mn);
}

// Pre-parse all event times
for (const ev of EVENTS) {
  ev._start = parseTime(ev.start);
  ev._end = parseTime(ev.end);
  // Handle cross-midnight
  if (ev._end && ev._start && ev._end <= ev._start) {
    ev._end = new Date(ev._end.getTime() + 86400000);
  }
}

// ---------------------------------------------------------------------------
// Haversine distance (meters)
// ---------------------------------------------------------------------------
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function formatDist(m) {
  if (m == null) return "";
  // Convert meters to yards (1m = 1.09361yd)
  const yards = m * 1.09361;
  if (yards < 1000) return Math.round(yards) + " yd";
  // Convert to miles (1760 yards = 1 mile)
  const miles = yards / 1760;
  return miles.toFixed(1) + " mi";
}

function formatMins(mins) {
  if (mins < 60) return mins + " min";
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m > 0 ? h + "h " + m + "m" : h + "h";
}

function fmtTime(d, showAP) {
  if (!d) return "--:--";
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2, "0");
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return h + ":" + m + (showAP ? " " + ap : "");
}

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let userLat = null, userLng = null;
let isLive = true;
let refOffsetMin = 0;   // minutes from "now" (0 = live)
let aheadMin = 60;
let minFilter = false;
let maxDistYards = 0;   // 0 = off (show all)
let sortByDist = false;
let musicOnly = false;
let favsOnly = false;
let searchQuery = "";
const NON_MUSIC_CATS = ["conversations", "film"];
let favorites = new Set();

// Restore favorites from localStorage
try {
  const saved = JSON.parse(localStorage.getItem("be_now_favs") || "[]");
  if (Array.isArray(saved)) favorites = new Set(saved);
} catch (e) {}

function saveFavs() {
  try { localStorage.setItem("be_now_favs", JSON.stringify([...favorites])); }
  catch (e) {}
}
let venueVisible = {};  // venue -> bool
let venueOpen = false;
let expandedIds = new Set();  // track which cards are expanded across renders

// Initialize venues
const allVenues = [...new Set(EVENTS.map(e => e.venue).filter(Boolean))].sort();
for (const v of allVenues) venueVisible[v] = true;

// Restore venue filter from localStorage
try {
  const saved = JSON.parse(localStorage.getItem("be_now_venues") || "null");
  if (saved && typeof saved === "object") {
    for (const v of allVenues) {
      venueVisible[v] = saved[v] !== false;
    }
  }
} catch (e) {}

// Restore look-ahead from localStorage
try {
  const savedAhead = localStorage.getItem("be_now_ahead");
  if (savedAhead) aheadMin = parseInt(savedAhead) || 60;
} catch (e) {}

// ---------------------------------------------------------------------------
// Geolocation
// ---------------------------------------------------------------------------
function initGeo() {
  if (!navigator.geolocation) {
    document.getElementById("geoStatus").textContent = "Geolocation not available";
    return;
  }
  navigator.geolocation.watchPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      document.getElementById("geoStatus").textContent =
        "GPS active (" + pos.coords.accuracy.toFixed(0) + "m accuracy)";
      document.getElementById("distSlider").disabled = false;
      render();
    },
    err => {
      document.getElementById("geoStatus").textContent =
        "GPS unavailable -- distances hidden";
      document.getElementById("distSlider").disabled = true;
    },
    { enableHighAccuracy: true, maximumAge: 30000 }
  );
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------
function getRefTime() {
  const now = new Date();
  if (isLive) return now;
  return new Date(now.getTime() + refOffsetMin * 60000);
}

function distTo(ev) {
  if (userLat == null || ev.lat == null) return null;
  return haversine(userLat, userLng, ev.lat, ev.lng);
}

function escHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
}

function makeCard(ev, ref, mode) {
  const dist = distTo(ev);
  const tierClass = ev.tier > 0 ? "tier-" + ev.tier : "";
  const hasDetail = ev.matchReason || ev.fullDesc || ev.artistId ||
                    (ev.tracks && ev.tracks.length);
  let timeInfo = "";

  if (mode === "now") {
    const remaining = Math.round((ev._end - ref) / 60000);
    const urgentClass = remaining <= 30 ? "urgent" : "ok";
    timeInfo = '<span class="remaining ' + urgentClass + '">' +
               formatMins(remaining) + "</span>";
  } else {
    const startsIn = Math.round((ev._start - ref) / 60000);
    timeInfo = '<span class="starts-in">in ' + formatMins(startsIn) + "</span>";
  }

  // Time: start (no AM/PM) - end (with AM/PM)
  const timeSpan = '<div class="time-span">' +
    fmtTime(ev._start, false) + " - " + fmtTime(ev._end, true) + "</div>";

  // Distance inline with venue
  let distPart = "";
  if (dist != null) {
    distPart = '<span class="dist-sep">:</span><span class="dist-val">' +
               formatDist(dist) + "</span>";
  }

  // Category badges
  let catHtml = "";
  if (ev.categories && ev.categories.length) {
    const badges = ev.categories.map(c => {
      let cls = "cat-badge";
      if (c.toLowerCase() === "free" || c.toLowerCase() === "free programming")
        cls += " free";
      if (c.toLowerCase() === "film") cls += " film";
      if (c.toLowerCase() === "what for? 35") cls += " whatfor";
      return '<span class="' + cls + '">' + c + "</span>";
    }).join("");
    catHtml = '<div class="categories">' + badges + "</div>";
  }

  // Summary text (shown inline, clamped to 2 lines)
  let descHtml = "";
  if (ev.summary) {
    descHtml = '<div class="desc-line">' + escHtml(ev.summary) + "</div>";
  }

  // Expandable detail: match reason + Tidal links
  let detailHtml = "";
  if (hasDetail) {
    let parts = [];
    if (ev.matchReason) {
      parts.push('<div class="match-reason">' + escHtml(ev.matchReason) + "</div>");
    }
    if (ev.fullDesc) {
      parts.push('<div class="full-desc">' + escHtml(ev.fullDesc) + "</div>");
    }
    if (ev.artistId) {
      parts.push('<a class="tidal-link artist-link" href="https://tidal.com/browse/artist/' +
        ev.artistId + '" onclick="event.stopPropagation()" target="_blank">' +
        'Open in Tidal</a>');
    }
    if (ev.tracks && ev.tracks.length) {
      let links = ev.tracks.map(t =>
        '<a class="tidal-link" href="https://tidal.com/browse/track/' + t.tidalId +
        '" onclick="event.stopPropagation()">' +
        '<span class="note-icon">&#9835;</span> ' +
        escHtml(t.title) + "</a>"
      ).join("");
      parts.push('<div class="tidal-links">' + links + "</div>");
    }
    detailHtml = '<div class="detail">' + parts.join("") + "</div>";
  }

  const arrowHtml = (hasDetail || ev.description)
    ? '<span class="expand-arrow">&#9660;</span>' : "";

  const isExpanded = expandedIds.has(ev.id);
  const isFav = favorites.has(ev.id);
  const favClass = isFav ? " is-fav" : "";
  const starClass = isFav ? "fav-star favorited" : "fav-star";
  return '<div class="card ' + tierClass + favClass + (isExpanded ? " expanded" : "") + '"' +
    ' data-id="' + ev.id + '"' +
    ((hasDetail || ev.summary) ? ' data-expandable="1"' : "") + ">" +
    '<span class="' + starClass + '" data-fav="' + ev.id + '">&#9733;</span>' +
    '<div class="card-header">' +
    '<div class="card-left">' +
    '<div class="artist">' + ev.title + arrowHtml + "</div>" +
    '<div class="venue-line"><span class="venue-name">' + ev.venue + "</span>" +
    distPart +
    (ev.genre ? '<span class="genre-tag">' + escHtml(ev.genre) + "</span>" : "") +
    "</div>" +
    "</div>" +
    '<div class="card-right">' +
    timeInfo +
    timeSpan +
    "</div>" +
    "</div>" +
    descHtml +
    catHtml +
    detailHtml +
    "</div>";
}

function render() {
  const ref = getRefTime();
  const ahead = new Date(ref.getTime() + aheadMin * 60000);

  // Update time display
  document.getElementById("refTimeDisplay").textContent = fmtTime(ref, true);
  document.getElementById("liveBadge").style.display = isLive ? "" : "none";

  // Filter events
  const visible = EVENTS.filter(e => {
    if (!e._start || !e._end) return false;
    if (venueVisible[e.venue] === false) return false;
    if (musicOnly && e.categories) {
      const cats = e.categories.map(c => c.toLowerCase());
      if (cats.some(c => NON_MUSIC_CATS.includes(c)) &&
          !cats.includes("festival performance")) return false;
    }
    if (favsOnly && !favorites.has(e.id)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = (e.title + " " + e.venue + " " + (e.genre || "")).toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    if (maxDistYards > 0) {
      const d = distTo(e);
      if (d != null && d * 1.09361 > maxDistYards) return false;
    }
    return true;
  });

  // Now playing
  let nowEvs = visible.filter(e => e._start <= ref && e._end > ref);
  if (minFilter) {
    nowEvs = nowEvs.filter(e => (e._end - ref) / 60000 >= 30);
  }
  // Distance tier: buckets by walking distance (yards)
  // 0=<200yd, 1=<500yd, 2=<1000yd, 3=<2000yd, 4=farther/unknown
  function distTier(ev) {
    const d = distTo(ev);
    if (d == null) return 4;
    const yd = d * 1.09361;
    if (yd < 200) return 0;
    if (yd < 500) return 1;
    if (yd < 1000) return 2;
    if (yd < 2000) return 3;
    return 4;
  }

  // Sort now playing: distance tier, then time left
  nowEvs.sort((a, b) => {
    if (sortByDist) {
      const dta = distTier(a), dtb = distTier(b);
      if (dta !== dtb) return dta - dtb;
    }
    // Time left (less time = higher urgency = sort first)
    const remA = a._end - ref, remB = b._end - ref;
    if (remA !== remB) return remA - remB;
    const ta = a.tier || 99, tb = b.tier || 99;
    return ta - tb;
  });

  document.getElementById("nowCount").textContent = nowEvs.length;
  document.getElementById("nowList").innerHTML = nowEvs.length
    ? nowEvs.map(e => makeCard(e, ref, "now")).join("")
    : '<div class="empty-msg">Nothing playing right now</div>';

  // Coming up
  let upEvs = visible.filter(e => e._start > ref && e._start <= ahead);
  // Sort coming up: distance tier, then start time
  upEvs.sort((a, b) => {
    if (sortByDist) {
      const dta = distTier(a), dtb = distTier(b);
      if (dta !== dtb) return dta - dtb;
    }
    const dt = a._start - b._start;
    if (dt !== 0) return dt;
    const ta = a.tier || 99, tb = b.tier || 99;
    return ta - tb;
  });

  document.getElementById("upCount").textContent = upEvs.length;
  document.getElementById("upList").innerHTML = upEvs.length
    ? upEvs.map(e => makeCard(e, ref, "up")).join("")
    : '<div class="empty-msg">Nothing in the next ' + formatMins(aheadMin) + "</div>";
}

// ---------------------------------------------------------------------------
// Controls
// ---------------------------------------------------------------------------

// Reference time slider
const refSlider = document.getElementById("refSlider");
const refValue = document.getElementById("refValue");
const resetBtn = document.getElementById("resetBtn");

refSlider.addEventListener("input", () => {
  const v = parseInt(refSlider.value);
  if (v === 0) {
    isLive = true;
    refOffsetMin = 0;
    refValue.textContent = "Now";
    resetBtn.style.display = "none";
  } else {
    isLive = false;
    refOffsetMin = v;
    refValue.textContent = "+" + formatMins(v);
    resetBtn.style.display = "";
  }
  render();
});

resetBtn.addEventListener("click", () => {
  isLive = true;
  refOffsetMin = 0;
  refSlider.value = 0;
  refValue.textContent = "Now";
  resetBtn.style.display = "none";
  render();
});

// Look-ahead slider
const aheadSlider = document.getElementById("aheadSlider");
const aheadValue = document.getElementById("aheadValue");
aheadSlider.value = aheadMin;
aheadValue.textContent = formatMins(aheadMin);

aheadSlider.addEventListener("input", () => {
  aheadMin = parseInt(aheadSlider.value);
  aheadValue.textContent = formatMins(aheadMin);
  try { localStorage.setItem("be_now_ahead", aheadMin); } catch (e) {}
  render();
});

// Distance slider (right = Any, left = tighter filter)
const distSlider = document.getElementById("distSlider");
const distValue = document.getElementById("distValue");
distSlider.addEventListener("input", () => {
  const v = parseInt(distSlider.value);
  maxDistYards = v >= 2000 ? 0 : v;  // 2000 = Any (no filter)
  distValue.textContent = maxDistYards === 0 ? "Any" :
    maxDistYards < 1760 ? maxDistYards + " yd" :
    (maxDistYards / 1760).toFixed(1) + " mi";
  render();
});

// Music only filter
const musicOnlyBtn = document.getElementById("musicOnlyBtn");
musicOnlyBtn.addEventListener("click", () => {
  musicOnly = !musicOnly;
  musicOnlyBtn.classList.toggle("active", musicOnly);
  render();
});

// Favorites only filter
const favsOnlyBtn = document.getElementById("favsOnlyBtn");
favsOnlyBtn.addEventListener("click", () => {
  favsOnly = !favsOnly;
  favsOnlyBtn.classList.toggle("active", favsOnly);
  render();
});

// Search
const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("input", () => {
  searchQuery = searchInput.value.trim();
  render();
});

// Sort by distance toggle
const sortDistBtn = document.getElementById("sortDistBtn");
sortDistBtn.addEventListener("click", () => {
  sortByDist = !sortByDist;
  sortDistBtn.classList.toggle("active", sortByDist);
  render();
});

// 30-min filter
const minBtn = document.getElementById("minFilter");
minBtn.addEventListener("click", () => {
  minFilter = !minFilter;
  minBtn.classList.toggle("active", minFilter);
  render();
});
// Initialize: button starts as "active" visually but filter is off
minBtn.classList.remove("active");

// Venue toggle
document.getElementById("venueToggle").addEventListener("click", () => {
  venueOpen = !venueOpen;
  document.getElementById("venuePanel").classList.toggle("open", venueOpen);
});

// Build venue grid
function buildVenueGrid() {
  const grid = document.getElementById("venueGrid");
  grid.innerHTML = allVenues.map(v =>
    '<label><input type="checkbox" data-venue="' + v.replace(/"/g, '&quot;') +
    '"' + (venueVisible[v] !== false ? " checked" : "") +
    '> ' + v + '</label>'
  ).join("");

  grid.addEventListener("change", e => {
    if (e.target.dataset.venue) {
      venueVisible[e.target.dataset.venue] = e.target.checked;
      saveVenues();
      render();
    }
  });
}

function saveVenues() {
  try { localStorage.setItem("be_now_venues", JSON.stringify(venueVisible)); }
  catch (e) {}
}

document.getElementById("venueAll").addEventListener("click", () => {
  for (const v of allVenues) venueVisible[v] = true;
  buildVenueGrid();
  saveVenues();
  render();
});

document.getElementById("venueNone").addEventListener("click", () => {
  for (const v of allVenues) venueVisible[v] = false;
  buildVenueGrid();
  saveVenues();
  render();
});

buildVenueGrid();

// Font size cycling: normal -> large -> larger -> normal
const FONT_SIZES = [
  { label: "Size: --", size: "16px" },
  { label: "Size: -",  size: "18px" },
  { label: "Size: 0",  size: "20px" },
  { label: "Size: +",  size: "22px" },
  { label: "Size: ++", size: "24px" },
];
let fontSizeIdx = 0;
try {
  const saved = parseInt(localStorage.getItem("be_now_font") || "0");
  if (saved >= 0 && saved < FONT_SIZES.length) fontSizeIdx = saved;
} catch(e) {}

function applyFontSize() {
  document.documentElement.style.fontSize = FONT_SIZES[fontSizeIdx].size;
  document.getElementById("fontSizeBtn").textContent = FONT_SIZES[fontSizeIdx].label;
}
applyFontSize();

document.getElementById("fontSizeBtn").addEventListener("click", () => {
  fontSizeIdx = (fontSizeIdx + 1) % FONT_SIZES.length;
  try { localStorage.setItem("be_now_font", fontSizeIdx); } catch(e) {}
  applyFontSize();
});

// Card expand/collapse via event delegation on both list containers
function handleCardClick(e) {
  // Handle star tap (favorite toggle)
  if (e.target.dataset.fav) {
    var fid = e.target.dataset.fav;
    if (favorites.has(fid)) {
      favorites.delete(fid);
    } else {
      favorites.add(fid);
    }
    saveFavs();
    render();
    return;
  }
  // Walk up from the click target to find a .card element
  var el = e.target;
  while (el && el !== document.body) {
    if (el.tagName === "A") return;  // don't toggle on link clicks
    if (el.classList && el.classList.contains("card") &&
        el.getAttribute("data-expandable")) {
      el.classList.toggle("expanded");
      var id = el.getAttribute("data-id");
      if (id) {
        if (el.classList.contains("expanded")) {
          expandedIds.add(id);
        } else {
          expandedIds.delete(id);
        }
      }
      return;
    }
    el = el.parentElement;
  }
}
document.getElementById("nowList").addEventListener("click", handleCardClick);
document.getElementById("upList").addEventListener("click", handleCardClick);

// ---------------------------------------------------------------------------
// Auto-refresh
// ---------------------------------------------------------------------------
setInterval(() => {
  if (isLive) render();
}, 60000);

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
initGeo();
render();
